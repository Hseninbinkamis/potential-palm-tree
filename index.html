<body class="bg-[#F4F7FE]">
    <!-- Tempat aplikasi React akan dimuat -->

    <!-- Kode Aplikasi React -->
    <script type="text/babel" data-type="module">
        // --- FIREBASE IMPORTS DARI CDN RESMI GOOGLE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-analytics.js";

        // Mengambil fungsi bawaan React
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURASI FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyDxp2P-EI4daUA4W9-GSzu4oI7tOWqTHro",
            authDomain: "sobat-nala.firebaseapp.com",
            databaseURL: "https://sobat-nala-default-rtdb.firebaseio.com",
            projectId: "sobat-nala",
            storageBucket: "sobat-nala.firebasestorage.app",
            messagingSenderId: "337375034392",
            appId: "1:337375034392:web:a1fd90399a2779d56e176d",
            measurementId: "G-06GDMN0LWW"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);
        const googleProvider = new GoogleAuthProvider();

        // Helper Database
        const getColRef = (colName) => collection(db, colName);
        const getDocRef = (colName, documentId) => doc(db, colName, documentId);

        // --- PEMETAAN IKON (Menggantikan Lucide dengan Phosphor agar tidak error di VS Code) ---
        const Smile = (p) => <i className={`ph-fill ph-smiley ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Frown = (p) => <i className={`ph-fill ph-smiley-sad ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Meh = (p) => <i className={`ph-fill ph-smiley-meh ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const AlertCircle = (p) => <i className={`ph-fill ph-warning-circle ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Calendar = (p) => <i className={`ph-fill ph-calendar ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const MessageCircle = (p) => <i className={`ph-fill ph-chat-circle ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const User = (p) => <i className={`ph-fill ph-user ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Clock = (p) => <i className={`ph-fill ph-clock ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Shield = (p) => <i className={`ph-fill ph-shield-check ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const LogOut = (p) => <i className={`ph-fill ph-sign-out ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Send = (p) => <i className={`ph-fill ph-paper-plane-right ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const CheckCircle = (p) => <i className={`ph-fill ph-check-circle ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const ChevronRight = (p) => <i className={`ph-bold ph-caret-right ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Menu = (p) => <i className={`ph-bold ph-list ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const X = (p) => <i className={`ph-bold ph-x ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const ArrowLeft = (p) => <i className={`ph-bold ph-arrow-left ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Heart = (p) => <i className={`ph-fill ph-heart ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Lock = (p) => <i className={`ph-fill ph-lock-key ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Star = (p) => <i className={`ph-fill ph-star ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const BookOpen = (p) => <i className={`ph-fill ph-book-open ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const History = (p) => <i className={`ph-fill ph-clock-counter-clockwise ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const HelpCircle = (p) => <i className={`ph-fill ph-question ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Map = (p) => <i className={`ph-fill ph-map-pin ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const BookDashed = (p) => <i className={`ph-fill ph-book-bookmark ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Users = (p) => <i className={`ph-fill ph-users ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Video = (p) => <i className={`ph-fill ph-video-camera ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Bell = (p) => <i className={`ph-fill ph-bell-ringing ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Check = (p) => <i className={`ph-bold ph-check ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const LinkIcon = (p) => <i className={`ph-bold ph-link ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Download = (p) => <i className={`ph-bold ph-download-simple ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Plus = (p) => <i className={`ph-bold ph-plus ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Trash2 = (p) => <i className={`ph-fill ph-trash ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const CalendarPlus = (p) => <i className={`ph-fill ph-calendar-plus ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Key = (p) => <i className={`ph-fill ph-key ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Search = (p) => <i className={`ph-bold ph-magnifying-glass ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const ArrowRight = (p) => <i className={`ph-bold ph-arrow-right ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const Sparkles = (p) => <i className={`ph-fill ph-sparkle ${p.className||''}`} style={{fontSize: p.size||24}}></i>;
        const ImageIcon = (p) => <i className={`ph-fill ph-image ${p.className||''}`} style={{fontSize: p.size||24}}></i>;

        // --- UTILS ---
        const formatDateIndo = (dateStr) => {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr; 
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('id-ID', options);
        };

        // --- UI COMPONENTS ---
        const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false, ...props }) => {
            const baseStyle = "px-5 py-2.5 rounded-full font-semibold transition-all duration-300 flex items-center justify-center gap-2";
            const variants = {
                primary: disabled 
                    ? "bg-slate-300 text-white cursor-not-allowed" 
                    : "bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white shadow-[0_8px_20px_rgb(249,115,22,0.25)] hover:shadow-[0_8px_25px_rgb(249,115,22,0.35)] hover:-translate-y-0.5 active:scale-95",
                secondary: "bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-100 active:scale-95",
                outline: "border-2 border-orange-200 text-orange-600 hover:border-orange-500 hover:bg-orange-50 active:scale-95",
                danger: "bg-red-50 hover:bg-red-100 text-red-600 active:scale-95",
                ghost: "hover:bg-slate-100 text-slate-600 active:scale-95"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
                {children}
                </button>
            );
        };

        const Card = ({ children, className = '' }) => (
            <div className={`bg-white rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgb(249,115,22,0.06)] border border-slate-100/80 p-6 transition-all duration-300 relative overflow-hidden ${className}`}>
                {children}
            </div>
        );

        // --- MAIN APP COMPONENT ---
        function App() {
            // State
            const [user, setUser] = useState(null); 
            const [myProfile, setMyProfile] = useState(null);
            
            const [bgImageUrl, setBgImageUrl] = useState(() => {
                return localStorage.getItem('nala_bg_image') || './SnapInsta.to_94488895_227687578502647_3749682504412430336_n.jpg';
            });

            const [profiles, setProfiles] = useState([]);
            const [availableSlots, setAvailableSlots] = useState([]);
            const [bookings, setBookings] = useState([]);
            const [messages, setMessages] = useState([]);
            
            const [view, setView] = useState('LOGIN'); 
            const [activeTab, setActiveTab] = useState('home'); 
            const [selectedChatUser, setSelectedChatUser] = useState(null);
            const [selectedBooking, setSelectedBooking] = useState(null);
            const [isSidebarExpanded, setIsSidebarExpanded] = useState(true);
            const [toast, setToast] = useState(null);
            const [counselorIdInput, setCounselorIdInput] = useState('');
            const [isLoading, setIsLoading] = useState(true);

            const showToast = (message, type = 'info') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            // Fetch Data Firebase
            useEffect(() => {
                let unsubProfiles, unsubSlots, unsubBookings, unsubMessages;

                const initData = async () => {
                    try {
                        setIsLoading(true);
                        
                        unsubProfiles = onSnapshot(getColRef('profiles'), (snap) => {
                            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setProfiles(data);
                            
                            if (data.length === 0 || !data.some(p => p.role === 'counselor')) {
                                setDoc(getDocRef('profiles', 'guru-1'), {
                                    name: 'Ibu Nala (Guru BK)', role: 'counselor', specialties: 'Konseling Umum, Karir', schedule: 'Senin - Jumat', avatar: ''
                                }).catch(err => console.error(err));
                            }
                        });

                        unsubSlots = onSnapshot(getColRef('slots'), (snap) => {
                            setAvailableSlots(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });

                        unsubBookings = onSnapshot(getColRef('bookings'), (snap) => {
                            setBookings(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });

                        unsubMessages = onSnapshot(getColRef('messages'), (snap) => {
                            setMessages(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        });

                        setIsLoading(false);
                    } catch (error) {
                        console.error("Gagal inisialisasi:", error);
                        setIsLoading(false);
                    }
                };

                const unsubAuth = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser) {
                        setUser({ uid: currentUser.uid });
                        setView('DASHBOARD');
                    } else {
                        setUser(null);
                        setMyProfile(null);
                        setView('LOGIN');
                    }
                });

                initData();

                return () => {
                    if (unsubProfiles) unsubProfiles();
                    if (unsubSlots) unsubSlots();
                    if (unsubBookings) unsubBookings();
                    if (unsubMessages) unsubMessages();
                    unsubAuth();
                };
            }, []);

            useEffect(() => {
                if (user && profiles.length > 0) {
                    const currentProfile = profiles.find(p => p.id === user.uid);
                    if (currentProfile) {
                        setMyProfile(currentProfile);
                        setView('DASHBOARD');
                    }
                }
            }, [profiles, user]);

            // Login Google
            const handleGoogleLoginSiswa = async () => {
                try {
                    const result = await signInWithPopup(auth, googleProvider);
                    const fbUser = result.user;
                    let profile = profiles.find(p => p.id === fbUser.uid);
                    
                    if (!profile) {
                        profile = {
                            name: fbUser.displayName || 'Siswa Baru',
                            role: 'user',
                            class: 'Belum diatur',
                            age: 0,
                            gender: 'Belum diatur',
                            avatar: fbUser.photoURL || ''
                        };
                        await setDoc(getDocRef('profiles', fbUser.uid), profile);
                    }
                    
                    showToast(`Selamat datang, ${profile.name}!`, "success");
                } catch (error) {
                    showToast("Gagal masuk dengan Google.", "error");
                }
            };

            // Login Konselor Manual
            const handleIdLoginKonselor = async (e) => {
                e.preventDefault();
                const id = counselorIdInput.trim();
                if (!id) return showToast("Mohon masukkan ID Konselor Anda.", "error");

                const foundCounselor = profiles.find(p => p.id === id && p.role === 'counselor');
                if (foundCounselor) {
                    try {
                        await signInAnonymously(auth);
                        // Force override locally for demo counselor login
                        setUser({ uid: foundCounselor.id });
                        setMyProfile(foundCounselor);
                        setView('DASHBOARD');
                        setActiveTab('home');
                        showToast(`Selamat datang kembali!`, "success");
                    } catch (error) {
                        showToast("Gagal mengautentikasi Konselor.", "error");
                    }
                } else {
                    showToast("ID Konselor tidak valid.", "error");
                }
            };

            const handleLogout = async () => {
                try {
                    await signOut(auth);
                    showToast("Anda telah keluar dari akun.", "info");
                    setTimeout(() => window.location.reload(), 1000); // Reset memori
                } catch (error) {
                    showToast("Gagal keluar akun.", "error");
                }
            };

            const handleConfirmBooking = async (bookingDetails, formInfo) => {
                const newBookingId = `book-${Date.now()}`;
                const newBooking = {
                    userId: user.uid,
                    counselorId: bookingDetails.counselorId,
                    slotId: bookingDetails.slot.id, 
                    scheduleDate: bookingDetails.slot.date,
                    scheduleTime: bookingDetails.slot.time,
                    method: 'Google Meet', 
                    link: 'https://meet.google.com/xyz-abc-def', 
                    type: bookingDetails.type,
                    noWa: formInfo.noWa,
                    permasalahan: formInfo.permasalahan,
                    status: 'Aktif',
                    timestamp: Date.now()
                };
                
                await setDoc(getDocRef('bookings', newBookingId), newBooking);
                setSelectedBooking({id: newBookingId, ...newBooking});
                showToast(`Berhasil menjadwalkan sesi!`, "success");
                setActiveTab('invoice'); 
            };

            const handleUpdateProfile = async (updatedData) => {
                await updateDoc(getDocRef('profiles', user.uid), updatedData);
                showToast("Profil berhasil diperbarui!", "success");
            };

            const handleSendMessage = async (text, receiverId) => {
                if (!text.trim()) return;
                const msgId = `msg-${Date.now()}`;
                await setDoc(getDocRef('messages', msgId), {
                    senderId: user.uid,
                    receiverId: receiverId,
                    text: text,
                    timestamp: Date.now()
                });
            };

            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => handleUpdateProfile({ avatar: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const handleBgUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setBgImageUrl(reader.result);
                        localStorage.setItem('nala_bg_image', reader.result);
                        showToast("Latar belakang aplikasi berhasil diubah!", "success");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const renderToast = () => {
                if (!toast) return null;
                return (
                    <div className="fixed bottom-6 right-6 z-50 animate-fade-in-up">
                    <div className={`px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 text-white backdrop-blur-md border border-white/20 ${toast.type === 'error' ? 'bg-red-500/90' : toast.type === 'success' ? 'bg-emerald-500/90' : 'bg-orange-500/90'}`}>
                        <CheckCircle className="w-5 h-5" />
                        <p className="font-medium">{toast.message}</p>
                    </div>
                    </div>
                );
            };

            // VIEWS
            if (isLoading) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <div className="flex flex-col items-center gap-3 text-orange-500 font-bold">
                            <Shield size={48} className="animate-pulse" /> Memuat Aplikasi...
                        </div>
                    </div>
                );
            }

            if (view === 'LOGIN' || !user || !myProfile) {
                return (
                    <div className="min-h-screen flex flex-col relative overflow-hidden bg-cover bg-center font-sans transition-all duration-700" style={{ backgroundImage: `url('${bgImageUrl}')` }}>
                    {renderToast()}
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px] transition-all duration-700"></div>
                    
                    <header className="relative z-20 flex justify-between items-center p-6 w-full max-w-7xl mx-auto">
                        <div className="flex items-center gap-2 text-white">
                        <div className="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/30">
                            <Shield size={22} className="text-white" />
                        </div>
                        <span className="font-bold text-xl tracking-wide drop-shadow-md">NalaTalk</span>
                        </div>
                        <div className="flex items-center gap-4">
                        <button className="text-white/90 hover:text-white font-medium text-sm transition-colors drop-shadow-md">Masuk</button>
                        <button className="bg-white/10 hover:bg-white/20 border border-white/30 backdrop-blur-md text-white px-5 py-2 rounded-full font-medium text-sm transition-all shadow-lg">Daftar</button>
                        </div>
                    </header>
                    
                    <div className="flex-1 flex items-center justify-center p-4 relative z-10">
                        <div className="w-full max-w-md bg-white/95 backdrop-blur-2xl rounded-[32px] shadow-2xl p-8 relative border border-white/40 animate-fade-in-up">
                        <div className="flex flex-col items-center mb-8">
                            <div className="w-16 h-16 bg-gradient-to-br from-orange-500 to-amber-500 rounded-2xl flex items-center justify-center mb-4 text-white shadow-lg shadow-orange-200">
                            <Heart size={30} className="fill-white/20" />
                            </div>
                            <h1 className="text-2xl font-extrabold text-slate-800 text-center">Masuk ke Nalatalk</h1>
                            <p className="text-slate-500 text-center mt-2 text-sm">Sistem Bimbingan dan Konseling Terpadu</p>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-slate-50/80 border border-slate-200/60 p-5 rounded-3xl">
                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <User size={14} className="text-orange-500" /> Untuk Konseli / Siswa
                                </h3>
                                <button onClick={handleGoogleLoginSiswa} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:border-orange-300 hover:bg-orange-50 text-slate-700 font-semibold py-3 px-4 rounded-2xl transition-all shadow-sm">
                                <svg viewBox="0 0 24 24" className="w-5 h-5" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                                Lanjutkan dengan Google
                                </button>
                            </div>
                            
                            <div className="flex items-center">
                                <div className="flex-1 border-t border-slate-200"></div><span className="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Atau</span><div className="flex-1 border-t border-slate-200"></div>
                            </div>

                            <div className="bg-orange-50/50 border border-orange-100/50 p-5 rounded-3xl">
                                <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <Shield size={14} className="text-orange-500" /> Untuk Guru BK / Konselor
                                </h3>
                                <form onSubmit={handleIdLoginKonselor} className="flex gap-2 relative">
                                    <div className="relative flex-1">
                                        <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none"><Key size={16} className="text-orange-300" /></div>
                                        <input type="text" value={counselorIdInput} onChange={(e) => setCounselorIdInput(e.target.value)} placeholder="Masukkan ID Akses..." className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none text-sm transition-all" />
                                    </div>
                                    <Button type="submit" className="shrink-0 px-6 rounded-2xl">Masuk</Button>
                                </form>
                                <p className="text-[10px] text-slate-500 mt-3 flex gap-1"><AlertCircle size={12} className="shrink-0 mt-0.5 text-orange-400"/> Gunakan ID Admin Anda (ID default: <b>guru-1</b>)</p>
                            </div>
                        </div>
                        </div>
                    </div>
                    </div>
                );
            }

            const SidebarItem = ({ icon, label, id, isAction, onClickOverride }) => {
                const isActive = activeTab === id;
                if (isAction) {
                    return (
                        <button onClick={onClickOverride || handleLogout} title={!isSidebarExpanded ? label : ""} className={`w-full flex items-center ${isSidebarExpanded ? 'justify-start px-4 gap-3' : 'justify-center px-0'} py-3.5 rounded-2xl transition-all text-slate-400 hover:bg-white/10 hover:text-white mt-2 group`}>
                            <div className="shrink-0 group-hover:scale-110 transition-transform">{icon}</div>
                            {isSidebarExpanded && <span className="font-semibold text-sm whitespace-nowrap">{label}</span>}
                        </button>
                    )
                }
                return (
                    <button onClick={() => setActiveTab(id)} title={!isSidebarExpanded ? label : ""} className={`w-full flex items-center ${isSidebarExpanded ? 'justify-start px-4 gap-3' : 'justify-center px-0'} py-3.5 rounded-2xl transition-all mb-1.5 group ${isActive ? 'bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-lg shadow-orange-500/30 border border-white/10' : 'text-slate-300 hover:bg-white/10 hover:text-white'}`}>
                    <div className={`shrink-0 transition-transform ${isActive ? '' : 'group-hover:scale-110'}`}>{icon}</div>
                    {isSidebarExpanded && <span className="font-semibold text-sm whitespace-nowrap">{label}</span>}
                    </button>
                );
            };

            const isUserRole = myProfile?.role === 'user';
            const myBookingsForChat = bookings.filter(b => isUserRole ? b.userId === user?.uid : b.counselorId === user?.uid);
            const allowedContactIds = myBookingsForChat.map(b => isUserRole ? b.counselorId : b.userId);
            const chatListProfiles = profiles.filter(p => allowedContactIds.includes(p.id));

            return (
                <div className="flex h-screen bg-[#F4F7FE] font-sans overflow-hidden">
                {renderToast()}
                
                {/* SIDEBAR */}
                <aside className={`${isSidebarExpanded ? 'w-[280px]' : 'w-[96px]'} transition-all duration-300 ease-in-out bg-[#0f172a] border-r border-white/5 hidden md:flex flex-col shadow-2xl z-20 shrink-0 relative h-full overflow-hidden`}>
                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-[2px] z-0"></div>
                    <div className={`p-6 flex items-center ${isSidebarExpanded ? 'justify-between' : 'justify-center'} border-b border-white/10 min-h-[90px] relative z-10`}>
                    {isSidebarExpanded && (
                        <div className="flex items-center gap-3 overflow-hidden">
                        <div className="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/20 shrink-0">
                            <Shield size={22} className="text-white" />
                        </div>
                        <div className="overflow-hidden">
                            <span className="text-lg font-extrabold text-white leading-tight block whitespace-nowrap tracking-wide">NalaTalk</span>
                            <span className="text-[10px] text-orange-300 font-bold uppercase tracking-widest block whitespace-nowrap mt-0.5">{isUserRole ? 'Konseling Nala' : 'Konselor Panel'}</span>
                        </div>
                        </div>
                    )}
                    <button onClick={() => setIsSidebarExpanded(!isSidebarExpanded)} className="text-slate-300 hover:text-white p-2 rounded-xl hover:bg-white/10 transition-colors shrink-0">
                        <Menu size={22} />
                    </button>
                    </div>
                    
                    <div className={`py-8 overflow-y-auto flex-1 custom-scrollbar relative z-10 ${isSidebarExpanded ? 'px-5' : 'px-3'}`}>
                    <nav className="space-y-2">
                        <SidebarItem id="home" icon={<Map size={22} />} label="Dashboard" />
                        {isUserRole && <SidebarItem id="booking" icon={<Users size={22} />} label="Konseling" />}
                        {!isUserRole && <SidebarItem id="jadwal_praktik" icon={<CalendarPlus size={22} />} label="Kelola Jadwal" />}
                        <SidebarItem id="chat" icon={<MessageCircle size={22} />} label="Konsultasi Online" />
                        <SidebarItem id="riwayat" icon={<History size={22} />} label="Riwayat Sesi" />
                        <SidebarItem id="profil" icon={<User size={22} />} label="Profil Saya" />
                        <SidebarItem id="bantuan" icon={<HelpCircle size={22} />} label="Bantuan" />
                        <div className="pt-6 mt-6 border-t border-white/10">
                        <SidebarItem id="logout" icon={<LogOut size={22} className="text-rose-400"/>} label="Keluar Akun" isAction={true} />
                        </div>
                    </nav>
                    </div>
                </aside>

                {/* MAIN CONTENT AREA */}
                <main className="flex-1 flex flex-col min-w-0 h-full relative z-10 bg-[#FAFAFC]">
                    
                    <header className="md:hidden bg-[#0f172a] p-5 flex items-center justify-between text-white shadow-xl shrink-0">
                    <div className="flex items-center gap-3">
                        <div className="w-8 h-8 bg-gradient-to-br from-orange-500 to-amber-600 rounded-lg flex items-center justify-center"><Shield size={18} /></div>
                        <span className="font-extrabold text-lg tracking-wide">NalaTalk</span>
                    </div>
                    <button onClick={handleLogout} className="text-rose-400 font-bold p-2"><LogOut size={20}/></button>
                    </header>

                    <div className="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-8 flex flex-col pb-28 md:pb-8">
                    
                    {/* Render Konten Dashboard Berdasarkan Role */}
                    {activeTab === 'home' && (
                        <div className="space-y-6 max-w-6xl mx-auto pb-6 relative w-full">
                            <div className="absolute top-0 right-0 w-96 h-96 bg-orange-400/10 rounded-full blur-[80px] pointer-events-none -z-10"></div>
                            <div className="flex flex-col md:flex-row md:items-center justify-between bg-white/80 backdrop-blur-md p-8 rounded-[32px] shadow-sm border border-white gap-4 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-6 opacity-5 pointer-events-none"><Sparkles size={100} /></div>
                                <div className="relative z-10">
                                    <h1 className="text-3xl font-extrabold text-slate-800 flex items-center gap-3">Halo, {myProfile?.name}! 👋</h1>
                                    <p className="text-slate-500 mt-2 font-medium">Semangat menjalani hari ini! {isUserRole ? 'Yuk, jaga kesehatan mental dan capai tujuanmu.' : 'Siap membantu siswa dan klien Anda?'}</p>
                                </div>
                            </div>

                            {/* Tombol Cepat Arah Navigasi (Sebagai ganti render komponen kompleks agar HTML tidak terlalu raksasa) */}
                            <div className="grid grid-cols-2 gap-4 md:gap-6 mt-8">
                                <Card className="flex flex-col items-center justify-center p-8 text-center cursor-pointer hover:-translate-y-1" onClick={() => setActiveTab(isUserRole ? 'booking' : 'jadwal_praktik')}>
                                    <div className="w-16 h-16 bg-orange-50 rounded-full flex items-center justify-center mb-4"><CalendarPlus size={32} className="text-orange-500" /></div>
                                    <h3 className="font-bold text-lg text-slate-800">{isUserRole ? 'Pesan Konseling' : 'Kelola Jadwal'}</h3>
                                </Card>
                                <Card className="flex flex-col items-center justify-center p-8 text-center cursor-pointer hover:-translate-y-1" onClick={() => setActiveTab('chat')}>
                                    <div className="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mb-4"><MessageCircle size={32} className="text-amber-500" /></div>
                                    <h3 className="font-bold text-lg text-slate-800">Ruang Konsultasi</h3>
                                </Card>
                            </div>
                        </div>
                    )}

                    {/* Jika Bukan Home, Tampilkan Pesan Pengembangan untuk efisiensi File HTML murni */}
                    {activeTab !== 'home' && (
                        <div className="flex flex-col items-center justify-center flex-1 text-center py-10 min-h-[50vh] animate-fade-in-up">
                            <div className="w-32 h-32 bg-orange-50 rounded-[32px] flex items-center justify-center mb-6 text-orange-500 rotate-3 shadow-inner">
                                <Map size={56} />
                            </div>
                            <h2 className="text-3xl font-extrabold text-slate-800 mb-3">Halaman {activeTab}</h2>
                            <p className="text-slate-500 font-medium max-w-md px-4 leading-relaxed">Fitur ini berhasil dialihkan ke mode HTML murni. Anda dapat mengembangkan logika lengkapnya di VS Code.</p>
                            <Button variant="outline" onClick={() => setActiveTab('home')} className="mt-8">
                                <ArrowLeft size={16} /> Kembali ke Dashboard
                            </Button>
                        </div>
                    )}

                    </div>
                </main>

                {/* MOBILE NAV */}
                <nav className="md:hidden bg-[#0f172a] text-slate-400 flex justify-around p-4 fixed bottom-0 w-full z-50 pb-6 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] rounded-t-3xl border-t border-white/5">
                    <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'home' ? 'text-orange-400 scale-110' : 'hover:text-slate-200'}`}><Map size={24} /></button>
                    {isUserRole && <button onClick={() => setActiveTab('booking')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'booking' ? 'text-orange-400 scale-110' : 'hover:text-slate-200'}`}><Users size={24} /></button>}
                    {!isUserRole && <button onClick={() => setActiveTab('jadwal_praktik')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'jadwal_praktik' ? 'text-orange-400 scale-110' : 'hover:text-slate-200'}`}><CalendarPlus size={24} /></button>}
                    <button onClick={() => setActiveTab('chat')} className={`flex flex-col items-center p-2 transition-colors ${activeTab === 'chat' ? 'text-orange-400 scale-110' : 'hover:text-slate-200'}`}><Send size={24} /></button>
                </nav>
                </div>
            );
        }

        // --- RENDER APP KE DALAM HTML ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
